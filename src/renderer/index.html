<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self'; img-src 'self' data: blob:; connect-src 'self' blob:; object-src 'none'; base-uri 'self';"
    />
    <title>NotificationAI</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="timeline">
        <div class="head">
          <h2>今日のスケジュール</h2>
          <button id="refreshButton">更新</button>
        </div>
        <div id="error" class="error"></div>
        <div id="timeline" class="timeline-board" aria-live="polite"></div>
      </section>
      <section class="vrm-panel">
        <div id="vrmCanvas"></div>
        <div id="vrmFallback" class="vrm-fallback">no image</div>
        <div id="characterState" class="state">state: idle</div>
      </section>
    </main>
    <script type="importmap">
      {
        "imports": {
          "three": "../../node_modules/three/build/three.module.js",
          "three/examples/jsm/": "../../node_modules/three/examples/jsm/",
          "@pixiv/three-vrm": "../../node_modules/@pixiv/three-vrm/lib/three-vrm.module.js"
        }
      }
    </script>
    <script type="module" src="./renderer.js"></script>
  </body>
  </html>
